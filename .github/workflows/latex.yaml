name: slides
on:
  - pull_request

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: slides - ai intro
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ai-slides.tex
          args: '-xelatex -file-line-error -interaction=nonstopmode -synctex=1 -shell-escape ai-slides'
          working_directory: ai-intro

      - name: slides - ai tokens
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ai-tokens.tex
          args: '-xelatex -file-line-error -interaction=nonstopmode -synctex=1 -shell-escape ai-tokens'
          working_directory: ai-tokens

      - name: slides - ai mcap and rag
        uses: xu-cheng/latex-action@v4
        with:
          root_file: ai-mcp-rag.tex
          args: '-xelatex -file-line-error -interaction=nonstopmode -synctex=1 -shell-escape ai-mcp-rag'
          working_directory: ai-mcp-rag